<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR-MBR-CS-001-05 가입 처리 완료</title>
  <style>
    :root {
      --color-fill-brand:        #3617CE;
      --color-fill-brand-hover:  #4D2EE0;
      --color-fill-brand-dim:    #EAE6FB;
      --color-text-primary:      #05001A;
      --color-text-secondary:    #5E6085;
      --color-text-subtle:       #B4C0DE;
      --color-text-white:        #FFFFFF;
      --color-bg-page:           #F4F5FA;
      --color-bg-elevated:       #FFFFFF;
      --color-border:            #E2E6F1;
      --color-border-strong:     #D2D9EB;
      --color-danger:            #E42939;
      --color-success:           #00B14F;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Pretendard', sans-serif;
      background: #e8eaf0;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 0 48px; gap: 16px;
    }
    .case-tabs { display: flex; gap: 8px; }
    .case-tabs button {
      padding: 6px 16px; border-radius: 20px;
      border: 1.5px solid var(--color-border-strong);
      background: #fff; color: var(--color-text-secondary);
      font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .case-tabs button.active { background: var(--color-fill-brand); border-color: var(--color-fill-brand); color: #fff; }
    .phone-frame {
      width: 375px; min-height: 812px; background: var(--color-bg-elevated);
      border-radius: 40px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      display: none; flex-direction: column;
    }
    .phone-frame.active { display: flex; }
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 24px 18px; background: var(--color-fill-brand);
      font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.85); flex-shrink: 0;
    }
    .status-bar .time { font-size: 15px; font-weight: 700; color: #fff; }
    .status-bar .icons { display: flex; gap: 6px; }

    /* Success full-screen area */
    .success-hero {
      background: var(--color-fill-brand);
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 32px 56px; gap: 20px;
    }
    /* Animated check circle */
    .check-circle {
      width: 100px; height: 100px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .check-circle::after {
      content: '';
      width: 40px; height: 24px;
      border-left: 4px solid #fff;
      border-bottom: 4px solid #fff;
      transform: rotate(-48deg) translateY(-4px);
      border-radius: 2px;
    }
    .hero-title {
      font-size: 26px; font-weight: 800; color: #fff; text-align: center; line-height: 1.3;
    }
    .hero-sub {
      font-size: 15px; color: rgba(255,255,255,0.75); text-align: center; line-height: 1.6;
    }

    /* Info cards */
    .info-section {
      flex: 1; padding: 28px 20px; display: flex; flex-direction: column; gap: 12px;
      background: var(--color-bg-page);
    }
    .info-section-title {
      font-size: 14px; font-weight: 700; color: var(--color-text-secondary); margin-bottom: 4px;
    }
    .info-card {
      background: var(--color-bg-elevated); border-radius: 14px; padding: 16px 20px;
      display: flex; align-items: center; gap: 16px;
      border: 1px solid var(--color-border);
    }
    .info-card-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
    }
    .info-card-body {}
    .info-card-label { font-size: 12px; color: var(--color-text-subtle); margin-bottom: 3px; }
    .info-card-value { font-size: 15px; font-weight: 600; color: var(--color-text-primary); }

    /* Auto login notice */
    .autologin-notice {
      background: var(--color-fill-brand-dim); border-radius: 10px;
      padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    }
    .autologin-notice .icon { font-size: 18px; flex-shrink: 0; }
    .autologin-notice .text { font-size: 13px; color: var(--color-fill-brand); font-weight: 500; }

    /* CTA */
    .cta-wrap { padding: 12px 20px 28px; background: var(--color-bg-elevated); flex-shrink: 0; }
    .cta-btn {
      display: flex; justify-content: center; align-items: center;
      width: 100%; padding: 16px; background: var(--color-fill-brand); border-radius: 9999px;
      color: var(--color-text-white); font-size: 16px; font-weight: 700; cursor: pointer; border: none;
    }

    /* Error case */
    .error-hero {
      background: #FEE8EA;
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 32px 40px; gap: 16px;
    }
    .error-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--color-danger); display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .error-title { font-size: 22px; font-weight: 700; color: var(--color-danger); text-align: center; }
    .error-desc { font-size: 14px; color: var(--color-text-secondary); text-align: center; line-height: 1.6; }
    .error-section {
      flex: 1; padding: 24px 20px; background: var(--color-bg-page); display: flex; flex-direction: column; gap: 12px;
    }
    .error-card {
      background: var(--color-bg-elevated); border-radius: 12px; padding: 16px;
      border: 1px solid #FFBFC4;
    }
    .error-card-label { font-size: 12px; color: var(--color-text-subtle); margin-bottom: 6px; }
    .error-card-value { font-size: 14px; color: var(--color-danger); font-weight: 500; }
  </style>
</head>
<body>

  <div class="case-tabs">
    <button class="active" onclick="showCase('0')">Case 0 · 가입 완료</button>
    <button onclick="showCase('E1')">Case E1 · 가입 실패</button>
  </div>

  <!-- ═══════════════ Case 0 — 가입 완료 ═══════════════ -->
  <div class="phone-frame active" id="case-0">
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="icons"><span>SKT</span><span>▲</span><span style="color:#fff">🔋</span></div>
    </div>

    <!-- Hero (brand bg) -->
    <div class="success-hero">
      <div class="check-circle"></div>
      <div class="hero-title">회원가입이<br>완료되었습니다!</div>
      <div class="hero-sub">SKT 서비스를 자유롭게<br>이용하실 수 있습니다</div>
    </div>

    <!-- Info section -->
    <div class="info-section">
      <div class="info-section-title">가입 정보</div>

      <div class="info-card">
        <div class="info-card-icon" style="background:#EAE6FB">👤</div>
        <div class="info-card-body">
          <div class="info-card-label">아이디</div>
          <div class="info-card-value">newuser123</div>
        </div>
      </div>

      <div class="info-card">
        <div class="info-card-icon" style="background:#E6F9EE">📱</div>
        <div class="info-card-body">
          <div class="info-card-label">연락처</div>
          <div class="info-card-value">010-1234-5678</div>
        </div>
      </div>

      <div class="autologin-notice">
        <div class="icon">🔑</div>
        <div class="text">확인 버튼을 누르면 자동으로 로그인됩니다</div>
      </div>
    </div>

    <div class="cta-wrap">
      <button class="cta-btn">확인</button>
    </div>
  </div>

  <!-- ═══════════════ Case E1 — 가입 실패 ═══════════════ -->
  <div class="phone-frame" id="case-E1">
    <div class="status-bar" style="background:var(--color-bg-elevated); color:var(--color-text-primary);">
      <span class="time" style="color:var(--color-text-primary)">9:41</span>
      <div class="icons"><span>SKT</span><span>▲</span><span>🔋</span></div>
    </div>

    <!-- Error Hero -->
    <div class="error-hero">
      <div class="error-icon">✕</div>
      <div class="error-title">가입에 실패했습니다</div>
      <div class="error-desc">일시적인 오류가 발생했습니다.<br>잠시 후 다시 시도해 주세요.</div>
    </div>

    <div class="error-section">
      <div class="info-section-title">오류 내용</div>
      <div class="error-card">
        <div class="error-card-label">오류 코드</div>
        <div class="error-card-value">MBR-E500 · 회원 등록 처리 실패</div>
      </div>
      <div class="error-card">
        <div class="error-card-label">안내</div>
        <div class="error-card-value" style="color:var(--color-text-secondary)">
          문제가 지속될 경우 고객센터(114)로 문의해 주세요
        </div>
      </div>
    </div>

    <div class="cta-wrap" style="display:flex;flex-direction:column;gap:8px;">
      <button class="cta-btn" style="background:transparent;border:1.5px solid var(--color-border-strong);color:var(--color-text-primary);">고객센터 문의</button>
      <button class="cta-btn">다시 시도</button>
    </div>
  </div>

  <script>
    function showCase(id) {
      document.querySelectorAll('.phone-frame').forEach(f => f.classList.remove('active'));
      document.querySelectorAll('.case-tabs button').forEach(b => b.classList.remove('active'));
      document.getElementById('case-' + id).classList.add('active');
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
